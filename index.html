<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنويه هام - منصتنا</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 6px solid #0088cc;
        }

        .icon {
            font-size: 50px;
            color: #ffcc00;
            margin-bottom: 20px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        p {
            color: #5a6c7d;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-telegram {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .btn-telegram:hover {
            background-color: #006699;
            transform: translateY(-2px);
        }

        .btn-telegram:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📢</div>
        
        <h2>تنويه هام</h2>
        
        <p>
            تم إيقاف العمل بنظام <strong>سكواد</strong>، والبدء بعمل <strong>ميزان دراسة</strong> ضمن باقة المنصة. 
            يمكنك الاستفسار والاشتراك عبر التواصل معنا على التليكرام.
        </p>

        <a href="https://t.me/mizaniq1" class="btn-telegram" target="_blank">
            تواصل معنا عبر التليكرام @mizaniq1
        </a>
    </div>

</body>
</html>
